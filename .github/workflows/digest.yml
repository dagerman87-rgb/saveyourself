# 주간 QA 다이제스트 (WO-008): 매주 일요일 KST 06:00 (UTC 토 21:00) docs/qa/week-NN.md 생성.
name: Weekly QA digest

on:
  schedule:
    # 일요일 KST 06:00
    - cron: "0 21 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build digest
        run: node engine/build-digest.mjs
