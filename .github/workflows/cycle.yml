# 비상 스위치 (WO-010): 주간 배치 실패 시 옛 API 파이프라인(run-cycle.mjs)을 수동으로만 돌린다.
# 크론 없음 — 실시간 세계의 정규 경로는 집컴의 event-runner.mjs + weekly.mjs다.
name: Manual cycle (emergency)

on:
  workflow_dispatch:

concurrency:
  group: cycle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install engine deps
        working-directory: engine
        run: npm ci
      - name: Run cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node engine/run-cycle.mjs

  deploy:
    needs: run-cycle
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
